{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>{% if pregunta %}Editar Pregunta{% else %}Nueva Pregunta{% endif %}</h2>
    <a href="/panel/preguntas" class="btn btn-secondary">Cancelar</a>
</div>

<div class="card">
    <form method="post" action="{% if pregunta %}/panel/preguntas/{{ pregunta.id }}/editar{% else %}/panel/preguntas/nueva{% endif %}">
        <div class="form-group">
            <label>Pregunta</label>
            <textarea name="pregunta" required>{% if pregunta %}{{ pregunta.pregunta }}{% endif %}</textarea>
        </div>
        <div class="form-group">
            <label>Respuesta</label>
            <textarea name="respuesta" required style="min-height:120px;">{% if pregunta %}{{ pregunta.respuesta }}{% endif %}</textarea>
        </div>
        <div class="form-group">
            <label>Categoría</label>
            <select name="categoria_id">
                <option value="">Sin categoría</option>
                {% for cat in categorias %}
                <option value="{{ cat.id }}" {% if pregunta and pregunta.categoria_id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        {% if pregunta %}
        <div class="form-group">
            <div class="form-check">
                <input type="checkbox" name="activa" id="activa" {% if pregunta.activa %}checked{% endif %}>
                <label for="activa" style="margin:0;">Pregunta activa</label>
            </div>
        </div>
        {% endif %}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{% if pregunta %}Guardar cambios{% else %}Crear pregunta{% endif %}</button>
            <a href="/panel/preguntas" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
