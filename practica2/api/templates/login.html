<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SmartBot — Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 320px; }
        h2 { margin-top: 0; text-align: center; }
        input { width: 100%; padding: 0.5rem; margin: 0.4rem 0 1rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 0.6rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #1d4ed8; }
        .error { color: #dc2626; font-size: 0.875rem; margin-bottom: 1rem; text-align: center; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 2.5rem; margin-bottom: 1rem; }
        .toggle-pw { position: absolute; right: 0.6rem; top: 50%; transform: translateY(-80%); background: none; border: none; cursor: pointer; width: auto; padding: 0; font-size: 1rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SmartBot Admin</h2>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" action="/login">
            <label>Usuario</label>
            <input type="text" name="username" required autofocus>
            <label>Contraseña</label>
            <div class="password-wrapper">
                <input type="password" name="password" id="password" required>
                <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
            </div>
            <button type="submit">Ingresar</button>
        </form>
    </div>
    <script>
        function togglePw() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
