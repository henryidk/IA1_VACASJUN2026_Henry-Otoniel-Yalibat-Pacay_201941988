<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartInvoice - Bitácora</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/api.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-receipt-cutoff me-2"></i>SmartInvoice
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="proveedores.html">
              <i class="bi bi-building me-1"></i>Proveedores
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="facturas.html">
              <i class="bi bi-file-earmark-text me-1"></i>Facturas
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="bitacora.html">
              <i class="bi bi-journal-text me-1"></i>Bitácora
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="reportes.html">
              <i class="bi bi-bar-chart-line me-1"></i>Reportes
            </a>
          </li>
        </ul>
        <span class="navbar-text text-white-50 me-3">
          <i class="bi bi-person-circle me-1"></i><span id="usuario-nombre">...</span>
        </span>
        <button id="btn-logout" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <section class="container py-4">
    <ul class="nav nav-tabs mb-3" id="tabs-bitacora">
      <li class="nav-item">
        <button class="nav-link active" id="tab-historial-btn" data-bs-toggle="tab" data-bs-target="#tab-historial" type="button">
          <i class="bi bi-journal-text me-1"></i>Bitácora completa
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="tab-rpa-btn" data-bs-toggle="tab" data-bs-target="#tab-rpa" type="button" onclick="cargarMonitoreoRpa()">
          <i class="bi bi-robot me-1"></i>Monitoreo RPA
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- Bitácora completa -->
      <div class="tab-pane fade show active" id="tab-historial">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white">
            <div class="row g-2">
              <div class="col-md-2">
                <select id="f-estado" class="form-select form-select-sm">
                  <option value="">Todos los estados</option>
                  <option value="pendiente">Pendiente</option>
                  <option value="procesado">Procesado</option>
                  <option value="rechazado">Rechazado</option>
                  <option value="error">Error</option>
                  <option value="exitoso">Exitoso</option>
                  <option value="enviado">Enviado</option>
                </select>
              </div>
              <div class="col-md-2">
                <select id="f-tipo-evento" class="form-select form-select-sm">
                  <option value="">Todos los eventos</option>
                  <option value="carga">Carga</option>
                  <option value="ocr">OCR</option>
                  <option value="validacion">Validación</option>
                  <option value="rpa">RPA</option>
                  <option value="email">Email</option>
                </select>
              </div>
              <div class="col-md-2">
                <input type="number" id="f-usuario-id" class="form-control form-control-sm" placeholder="ID de usuario">
              </div>
              <div class="col-md-2">
                <input type="date" id="f-fecha-desde" class="form-control form-control-sm">
              </div>
              <div class="col-md-2">
                <input type="date" id="f-fecha-hasta" class="form-control form-control-sm">
              </div>
              <div class="col-md-2">
                <button class="btn btn-primary btn-sm w-100" onclick="cargarBitacora()">
                  <i class="bi bi-funnel me-1"></i>Filtrar
                </button>
              </div>
            </div>
          </div>
          <div class="card-body">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Fecha y hora</th>
                  <th>Evento</th>
                  <th>Documento</th>
                  <th>Usuario</th>
                  <th>Estado</th>
                  <th>Resultado</th>
                </tr>
              </thead>
              <tbody id="tabla-bitacora">
                <tr><td colspan="6" class="text-center text-muted py-4">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Monitoreo RPA -->
      <div class="tab-pane fade" id="tab-rpa">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white">
            <h5 class="mb-0"><i class="bi bi-robot me-2"></i>Última ejecución de RPA por factura</h5>
          </div>
          <div class="card-body">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Factura</th>
                  <th>Estado de la factura</th>
                  <th>Última ejecución RPA</th>
                  <th>Resultado</th>
                </tr>
              </thead>
              <tbody id="tabla-rpa">
                <tr><td colspan="4" class="text-center text-muted py-4">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/bitacora.js"></script>
</body>
</html>
