<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartInvoice - Reportes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/api.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-receipt-cutoff me-2"></i>SmartInvoice
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="proveedores.html">
              <i class="bi bi-building me-1"></i>Proveedores
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="facturas.html">
              <i class="bi bi-file-earmark-text me-1"></i>Facturas
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="bitacora.html">
              <i class="bi bi-journal-text me-1"></i>Bitácora
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="reportes.html">
              <i class="bi bi-bar-chart-line me-1"></i>Reportes
            </a>
          </li>
        </ul>
        <span class="navbar-text text-white-50 me-3">
          <i class="bi bi-person-circle me-1"></i><span id="usuario-nombre">...</span>
        </span>
        <button id="btn-logout" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <section class="container py-4">
    <div id="alerta-global" class="alert d-none" role="alert"></div>

    <div class="card shadow-sm border-0">
      <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-bar-chart-line me-2"></i>Generar reporte de facturas</h5>
      </div>
      <div class="card-body">
        <div class="row g-3 align-items-end mb-3">
          <div class="col-md-3">
            <label class="form-label">Estado</label>
            <select id="r-estado" class="form-select">
              <option value="">Todos</option>
              <option value="pendiente">Pendiente</option>
              <option value="procesado">Procesado</option>
              <option value="rechazado">Rechazado</option>
              <option value="error">Error</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Proveedor</label>
            <select id="r-proveedor" class="form-select">
              <option value="">Todos</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Desde</label>
            <input type="date" id="r-fecha-desde" class="form-control">
          </div>
          <div class="col-md-3">
            <label class="form-label">Hasta</label>
            <input type="date" id="r-fecha-hasta" class="form-control">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" onclick="generarReporte('pdf')">
            <i class="bi bi-file-earmark-pdf me-1"></i>Generar PDF
          </button>
          <button class="btn btn-outline-primary" onclick="generarReporte('excel')">
            <i class="bi bi-file-earmark-excel me-1"></i>Generar Excel
          </button>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0 mt-4" id="card-enviar" style="display:none;">
      <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-envelope me-2"></i>Enviar el último reporte generado por correo</h5>
      </div>
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-8">
            <label class="form-label">Destinatario (opcional, por defecto tu correo)</label>
            <input type="email" id="r-destinatario" class="form-control" placeholder="correo@ejemplo.com">
          </div>
          <div class="col-md-4">
            <button class="btn btn-success w-100" onclick="enviarReporte()">
              <i class="bi bi-send me-1"></i>Enviar por correo
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/reportes.js"></script>
</body>
</html>
