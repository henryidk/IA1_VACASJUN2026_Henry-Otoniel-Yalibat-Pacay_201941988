<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartInvoice - Facturas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/api.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-receipt-cutoff me-2"></i>SmartInvoice
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="proveedores.html">
              <i class="bi bi-building me-1"></i>Proveedores
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="facturas.html">
              <i class="bi bi-file-earmark-text me-1"></i>Facturas
            </a>
          </li>
        </ul>
        <span class="navbar-text text-white-50 me-3">
          <i class="bi bi-person-circle me-1"></i><span id="usuario-nombre">...</span>
        </span>
        <button id="btn-logout" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <section class="container py-4">
    <div id="alerta-global" class="alert d-none" role="alert"></div>

    <!-- Carga de factura -->
    <div class="card shadow-sm border-0 mb-4">
      <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-cloud-upload me-2"></i>Cargar factura</h5>
      </div>
      <div class="card-body">
        <form id="form-carga" class="row g-3 align-items-end">
          <div class="col-md-6">
            <label class="form-label">Archivo (PDF, JPG, JPEG o PNG)</label>
            <input type="file" class="form-control" id="archivo-factura" accept=".pdf,.jpg,.jpeg,.png" required>
          </div>
          <div class="col-md-3">
            <button type="submit" class="btn btn-primary" id="btn-cargar">
              <i class="bi bi-upload me-1"></i>Subir y procesar
            </button>
          </div>
          <div class="col-12">
            <div id="vista-previa" class="d-none">
              <p class="text-muted small mb-1">Vista previa:</p>
              <img id="vista-previa-imagen" class="img-thumbnail d-none" style="max-height: 220px;">
              <embed id="vista-previa-pdf" class="d-none border rounded" style="width: 100%; height: 300px;">
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Listado de facturas -->
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>Facturas cargadas</h5>
        <div class="d-flex gap-2">
          <select id="filtro-estado" class="form-select form-select-sm" style="width: auto;">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="procesado">Procesado</option>
            <option value="rechazado">Rechazado</option>
            <option value="error">Error</option>
          </select>
          <button class="btn btn-outline-secondary btn-sm" onclick="cargarFacturas()">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
      </div>
      <div class="card-body">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>Archivo</th>
              <th>No. Factura</th>
              <th>Fecha</th>
              <th>Total</th>
              <th>Estado</th>
              <th>Cargado</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-facturas">
            <tr><td colspan="7" class="text-center text-muted py-4">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/facturas.js"></script>
</body>
</html>
