<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartInvoice - Proveedores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/api.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-receipt-cutoff me-2"></i>SmartInvoice
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="proveedores.html">
              <i class="bi bi-building me-1"></i>Proveedores
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="facturas.html">
              <i class="bi bi-file-earmark-text me-1"></i>Facturas
            </a>
          </li>
        </ul>
        <span class="navbar-text text-white-50 me-3">
          <i class="bi bi-person-circle me-1"></i><span id="usuario-nombre">...</span>
        </span>
        <button id="btn-logout" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <section class="container py-4">
    <div id="alerta-global" class="alert d-none" role="alert"></div>

    <div class="card shadow-sm border-0">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="bi bi-building me-2"></i>Proveedores</h5>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modal-proveedor" onclick="abrirModalCrear()">
          <i class="bi bi-plus-lg me-1"></i>Agregar proveedor
        </button>
      </div>
      <div class="card-body">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>NIT</th>
              <th>Dirección</th>
              <th>Teléfono</th>
              <th>Email</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-proveedores">
            <tr><td colspan="6" class="text-center text-muted py-4">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Modal alta/edición -->
  <div class="modal fade" id="modal-proveedor" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="form-proveedor">
          <div class="modal-header">
            <h5 class="modal-title" id="modal-proveedor-titulo">Agregar proveedor</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div id="proveedor-error" class="alert alert-danger d-none"></div>
            <input type="hidden" id="proveedor-id">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" id="proveedor-nombre" required>
            </div>
            <div class="mb-3">
              <label class="form-label">NIT</label>
              <input type="text" class="form-control" id="proveedor-nit" placeholder="12345678-9" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Dirección</label>
              <input type="text" class="form-control" id="proveedor-direccion">
            </div>
            <div class="mb-3">
              <label class="form-label">Teléfono</label>
              <input type="text" class="form-control" id="proveedor-telefono">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="proveedor-email">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/proveedores.js"></script>
</body>
</html>
