<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartInvoice - Detalle de factura</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/api.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-receipt-cutoff me-2"></i>SmartInvoice
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="proveedores.html">
              <i class="bi bi-building me-1"></i>Proveedores
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="facturas.html">
              <i class="bi bi-file-earmark-text me-1"></i>Facturas
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="bitacora.html">
              <i class="bi bi-journal-text me-1"></i>Bitácora
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="reportes.html">
              <i class="bi bi-bar-chart-line me-1"></i>Reportes
            </a>
          </li>
        </ul>
        <span class="navbar-text text-white-50 me-3">
          <i class="bi bi-person-circle me-1"></i><span id="usuario-nombre">...</span>
        </span>
        <button id="btn-logout" class="btn btn-outline-light btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <section class="container py-4">
    <a href="facturas.html" class="btn btn-link ps-0"><i class="bi bi-arrow-left me-1"></i>Volver a facturas</a>
    <div id="alerta-global" class="alert d-none" role="alert"></div>

    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="bi bi-file-earmark-text me-2"></i><span id="factura-nombre-archivo">Factura</span></h5>
            <span id="factura-estado"></span>
          </div>
          <div class="card-body">
            <p class="text-muted small">
              Revisa los campos extraídos por el OCR. Si algo se leyó mal, corrígelo aquí antes de registrar.
            </p>
            <form id="form-factura" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">No. Factura</label>
                <input type="text" class="form-control" id="f-numero_factura">
              </div>
              <div class="col-md-6">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" id="f-fecha">
              </div>
              <div class="col-md-12">
                <label class="form-label">Proveedor</label>
                <select class="form-select" id="f-proveedor_id">
                  <option value="">Sin vincular</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Subtotal</label>
                <input type="number" step="0.01" class="form-control" id="f-subtotal">
              </div>
              <div class="col-md-4">
                <label class="form-label">Impuestos</label>
                <input type="number" step="0.01" class="form-control" id="f-impuestos">
              </div>
              <div class="col-md-4">
                <label class="form-label">Total</label>
                <input type="number" step="0.01" class="form-control" id="f-total">
              </div>
              <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-save me-1"></i>Guardar cambios
                </button>
                <button type="button" id="btn-registrar" class="btn btn-success">
                  <i class="bi bi-robot me-1"></i>Registrar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white">
            <h5 class="mb-0"><i class="bi bi-card-text me-2"></i>Texto extraído por OCR</h5>
          </div>
          <div class="card-body">
            <pre id="factura-texto-ocr" class="small text-muted" style="white-space: pre-wrap; max-height: 400px; overflow-y: auto;"></pre>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/factura-detalle.js"></script>
</body>
</html>
