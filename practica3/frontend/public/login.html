<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartInvoice - Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-wrapper">
    <div class="card shadow login-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-receipt-cutoff display-5 text-primary"></i>
          <h1 class="h4 fw-bold mt-2 mb-0">SmartInvoice</h1>
          <p class="text-muted small">Procesamiento inteligente de facturas</p>
        </div>

        <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

        <form id="form-login">
          <div class="mb-3">
            <label for="email" class="form-label">Correo</label>
            <input type="email" class="form-control" id="email" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Ingresar
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
